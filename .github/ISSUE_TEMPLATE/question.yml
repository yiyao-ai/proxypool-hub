name: Question / Help
description: Ask a question about setup or usage
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help!
        For general discussions, consider using [GitHub Discussions](https://github.com/codeking-ai/cligate/discussions) instead.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Any steps you've already taken to solve this

  - type: input
    id: version
    attributes:
      label: CliGate Version
      placeholder: "e.g. 1.2.0"

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / publishing
        - Accounts / OAuth
        - App routing / model mapping
        - Agent runtime / channels
        - Dashboard usage
        - Other

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - N/A
