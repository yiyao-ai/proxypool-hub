<!DOCTYPE html>
<html lang="en" data-theme="codex" class="dark">

<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem('proxy-theme')==='light'){document.documentElement.classList.replace('dark','light')}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CliGate</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <script type="module" src="/js/app.js?v=20260510-page-modules-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/css/style.css?v=20260503-sidebar-section-spacing-1">
</head>

<body class="bg-space-950 text-gray-300 font-sans antialiased min-h-screen selection:bg-neon-purple selection:text-white"
    x-data="app" x-init="init()">

    <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
        <template x-if="toast">
            <div x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-8 scale-95"
                x-transition:enter-end="opacity-100 translate-x-0 scale-100"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-x-0 scale-100"
                x-transition:leave-end="opacity-0 translate-x-4 scale-95"
                class="alert shadow-lg border backdrop-blur-md pointer-events-auto min-w-[300px]"
                :class="{
                    'alert-info border-neon-cyan/20 bg-space-900/90 text-neon-cyan': toast.type === 'info',
                    'alert-success border-neon-green/20 bg-space-900/90 text-neon-green': toast.type === 'success',
                    'alert-error border-red-500/20 bg-space-900/90 text-red-400': toast.type === 'error',
                    'alert-warning border-yellow-500/20 bg-space-900/90 text-yellow-400': toast.type === 'warning'
                }">
                <div class="flex items-center gap-3">
                    <template x-if="toast.type === 'info'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </template>
                    <template x-if="toast.type === 'success'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </template>
                    <template x-if="toast.type === 'error'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </template>
                    <template x-if="toast.type === 'warning'">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </template>
                    <span x-text="toast.message" class="font-mono text-sm"></span>
                </div>
            </div>
        </template>
    </div>

    <header class="app-topbar">
        <div class="topbar-brand">
            <button @click="toggleSidebar()" class="topbar-menu-button focus:outline-none p-1 lg:hidden">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div class="topbar-brand-mark w-8 h-8 rounded bg-gradient-to-br from-neon-purple to-blue-600 flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                CX
            </div>
            <div class="topbar-brand-copy flex flex-col">
                <div class="topbar-title-row">
                    <span class="text-sm font-bold tracking-wide text-white" x-text="t('codexProxy')"></span>
                </div>
                <div class="topbar-meta flex flex-col gap-0.5">
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] text-gray-500 font-mono tracking-wider" x-text="t('claudeProxySystem')"></span>
                        <span class="text-[10px] text-gray-500 font-mono tracking-wider" x-text="'v' + version"></span>
                    </div>
                    <a href="https://github.com/codeking-ai/cligate" target="_blank" class="topbar-meta-link text-[10px] text-neon-purple hover:text-purple-400 hover:underline transition-colors flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        <span x-text="t('starOnGithub')"></span>
                    </a>
                </div>
            </div>
        </div>

        <div class="topbar-actions flex flex-wrap items-center justify-end gap-2 lg:gap-4">
            <!-- Language Toggle -->
            <div class="topbar-chip-group flex items-center gap-1 text-xs font-mono">
                <button @click="setLang('en')" class="px-1.5 py-0.5 rounded transition-all"
                    :class="lang === 'en' ? 'bg-neon-purple/20 text-neon-purple border border-neon-purple/30' : 'text-gray-500 hover:text-gray-300'">EN</button>
                <button @click="setLang('zh')" class="px-1.5 py-0.5 rounded transition-all"
                    :class="lang === 'zh' ? 'bg-neon-purple/20 text-neon-purple border border-neon-purple/30' : 'text-gray-500 hover:text-gray-300'">中文</button>
            </div>

            <div class="topbar-divider h-4 w-px bg-space-border"></div>

            <!-- Theme Toggle -->
            <button @click="toggleTheme()" class="topbar-icon-button btn btn-ghost btn-xs btn-square" :title="darkMode ? 'Light Mode' : 'Dark Mode'">
                <!-- Sun icon (shown in dark mode) -->
                <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>

            <div class="topbar-divider h-4 w-px bg-space-border"></div>

            <div class="topbar-status flex items-center gap-2 px-3 py-1 rounded-full text-xs font-mono border transition-all duration-300"
                :class="connectionStatus === 'connected'
                    ? 'bg-neon-green/10 border-neon-green/20 text-neon-green'
                    : 'bg-red-500/10 border-red-500/20 text-red-500'">
                <div class="w-1.5 h-1.5 rounded-full"
                    :class="connectionStatus === 'connected' ? 'bg-neon-green shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500'">
                </div>
                <span x-text="connectionStatus === 'connected' ? t('online') : t('offline')"></span>
            </div>

            <div class="topbar-divider h-4 w-px bg-space-border"></div>

            <button type="button" class="topbar-icon-button btn btn-ghost btn-xs btn-square"
                @click="refreshAccounts()" :disabled="loading" :title="t('refreshData')">
                <svg class="w-4 h-4" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
    </header>

    <div class="app-shell relative">
        <div x-show="isSmallScreen && sidebarOpen" x-transition.opacity
            @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-40 lg:hidden" style="display: none;"></div>

        <div class="sidebar bg-space-900 border-r border-space-border/30"
            :class="{ 'collapsed': !isSmallScreen && sidebarCollapsed, 'sidebar-open': isSmallScreen && sidebarOpen }">
            <div class="sidebar-inner flex flex-col h-full pt-6 pb-4 flex-shrink-0" :style="{ width: isSmallScreen ? '16rem' : (sidebarCollapsed ? '3.5rem' : '16rem') }">
                <div class="sidebar-head flex items-center justify-end px-4 mb-2 flex-shrink-0">
                    <button class="sidebar-collapse-btn" @click="toggleSidebar()" :title="isSmallScreen ? t('close') : (sidebarCollapsed ? 'Expand' : 'Collapse')">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                        </svg>
                    </button>
                </div>

                <div class="sidebar-scroll flex-1 min-h-0 overflow-y-auto px-2">
                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('workspace')" :aria-expanded="isSectionExpanded('workspace')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('workspace')"></span>
                            <svg class="sidebar-section-chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                :class="{ 'rotate-180': isSectionExpanded('workspace') }">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <nav class="flex flex-col gap-1" x-show="isSectionExpanded('workspace')">
                            <button class="nav-item"
                                :class="{'active': activeTab === 'dashboard'}" @click="setActiveTab('dashboard')" :title="sidebarCollapsed ? t('dashboard') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('dashboard')"></span>
                            </button>
                            <button class="nav-item"
                                :class="{'active': activeTab === 'chat'}" @click="setActiveTab('chat')" :title="sidebarCollapsed ? t('chat') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('chat')"></span>
                            </button>
                            <button class="nav-item"
                                :class="{'active': activeTab === 'assistantTasks'}" @click="setActiveTab('assistantTasks')" :title="sidebarCollapsed ? t('assistantTasks') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5h6M9 9h6M5 13h14M5 17h10M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H8l-4 4V6z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('assistantTasks')"></span>
                            </button>
                            <button class="nav-item"
                                :class="{'active': activeTab === 'assistantWorkbench'}" @click="setActiveTab('assistantWorkbench')" :title="sidebarCollapsed ? t('assistantWorkbench') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h18M3 12h18M3 19h18M8 5v14m8-14v14" />
                                </svg>
                                <span class="sidebar-label" x-text="t('assistantWorkbench')"></span>
                            </button>
                            <button class="nav-item"
                                :class="{'active': activeTab === 'conversationRecords'}" @click="setActiveTab('conversationRecords')" :title="sidebarCollapsed ? t('conversationRecords') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('conversationRecords')"></span>
                            </button>
                        </nav>
                    </div>

                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('assistant')" :aria-expanded="isSectionExpanded('assistant')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('assistantDirectory')"></span>
                            <svg class="sidebar-section-chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                :class="{ 'rotate-180': isSectionExpanded('assistant') }">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <nav class="flex flex-col gap-1" x-show="isSectionExpanded('assistant')">
                            <button class="nav-item"
                                :class="{'active': activeTab === 'assistantAgent'}" @click="setActiveTab('assistantAgent')" :title="sidebarCollapsed ? t('assistantAgentTitle') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3a.75.75 0 01.75.75v.443c.794.077 1.56.264 2.287.548l.313-.313a.75.75 0 011.06 0l1.415 1.414a.75.75 0 010 1.061l-.313.313c.284.726.47 1.492.548 2.286h.444a.75.75 0 01.75.75v2a.75.75 0 01-.75.75h-.444a7.479 7.479 0 01-.548 2.287l.313.313a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0l-.313-.313a7.479 7.479 0 01-2.287.548v.444a.75.75 0 01-.75.75h-2a.75.75 0 01-.75-.75v-.444a7.479 7.479 0 01-2.286-.548l-.313.313a.75.75 0 01-1.061 0L4.42 18.58a.75.75 0 010-1.06l.313-.313A7.479 7.479 0 014.186 14.92h-.443a.75.75 0 01-.75-.75v-2a.75.75 0 01.75-.75h.443c.077-.794.264-1.56.548-2.286l-.313-.313a.75.75 0 010-1.061L5.835 4.35a.75.75 0 011.061 0l.313.313A7.479 7.479 0 019.496 4.12V3.75A.75.75 0 0110.246 3h-.496z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9.75A2.25 2.25 0 109 12a2.25 2.25 0 003 2.25" />
                                </svg>
                                <span class="sidebar-label" x-text="t('assistantAgentTitle')"></span>
                            </button>
                        </nav>
                    </div>

                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('cliTools')" :aria-expanded="isSectionExpanded('cliTools')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('cliToolsDirectory')"></span>
                            <svg class="sidebar-section-chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                :class="{ 'rotate-180': isSectionExpanded('cliTools') }">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <nav class="flex flex-col gap-1" x-show="isSectionExpanded('cliTools')">
                            <button class="nav-item"
                                :class="{'active': activeTab === 'tools'}" @click="setActiveTab('tools'); loadToolsStatus()" :title="sidebarCollapsed ? t('toolInstaller') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                                <span class="sidebar-label" x-text="t('toolInstaller')"></span>
                            </button>
                        </nav>
                    </div>

                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('credentials')" :aria-expanded="isSectionExpanded('credentials')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('credentials')"></span>
                            <svg class="sidebar-section-chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                :class="{ 'rotate-180': isSectionExpanded('credentials') }">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <nav class="flex flex-col gap-1" x-show="isSectionExpanded('credentials')">
                            <button class="nav-item"
                                :class="{'active': activeTab === 'accounts'}" @click="setActiveTab('accounts')" :title="sidebarCollapsed ? t('accounts') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('accounts')"></span>
                            </button>
                            <button class="nav-item"
                                :class="{'active': activeTab === 'apikeys'}" @click="setActiveTab('apikeys')" :title="sidebarCollapsed ? t('apiKeys') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('apiKeys')"></span>
                            </button>
                            <button class="nav-item"

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L6 20.75V6a2 2 0 012-2h8a2 2 0 012 2v5.25M15 15h6m-3-3v6"></path>
                                </svg>
                                <span class="sidebar-label" x-text="t('localModels')"></span>
                            </button>
                        </nav>
                    </div>

                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('channels')" :aria-expanded="isSectionExpanded('channels')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('channels')"></span>
                            <svg class="sidebar-section-chevron w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                :class="{ 'rotate-180': isSectionExpanded('channels') }">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <nav class="flex flex-col gap-1" x-show="isSectionExpanded('channels')">
                            <button class="nav-item"
                                :class="{'active': activeTab === 'channels'}" @click="setActiveTab('channels')" :title="sidebarCollapsed ? t('channels') : ''">
                                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9h8m-8 4h5m-9 8h16a2 2 0 002-2V7a2 2 0 00-2-2h-3l-2-2H9L7 5H4a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <span class="sidebar-label" x-text="t('channels')"></span>
                            </button>
                        </nav>
                    </div>

                    <div class="sidebar-group">
                        <button class="sidebar-section-toggle" @click="toggleNavSection('configuration')" :aria-expanded="isSectionExpanded('configuration')">
                            <span class="sidebar-section-title text-gray-600 uppercase tracking-widest" x-text="t('configuration')"></span>

                    </div>
                </template>

                <template x-if="!configViewerLoading && !configViewerError && !configViewerFile.exists">
                    <div class="view-card">
                        <div class="text-sm text-yellow-400 font-mono" x-text="t('fileNotFound')"></div>
                    </div>
                </template>

                <template x-if="!configViewerLoading && !configViewerError && configViewerFile.exists">
                    <div class="view-card !p-0 overflow-hidden">
                        <div class="px-6 py-4 border-b border-space-border/50">
                            <div class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('rawFileContent')"></div>
                        </div>
                        <pre class="config-viewer-pre" x-text="configViewerFile.content"></pre>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>
