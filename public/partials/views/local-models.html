<div class="workspace-header flex items-center justify-between gap-4 mb-6">
                    <div>
                        <div class="workspace-eyebrow text-xs font-mono uppercase tracking-[0.32em]" x-text="t('configuration')"></div>
                        <div class="flex flex-wrap items-center gap-4 mt-2">
                            <h1 class="text-2xl font-bold text-white tracking-tight" x-text="t('localModels')"></h1>
                            <div class="meta-chip flex items-center h-6 px-3 rounded-full bg-space-800/80 border border-space-border/50 shadow-sm backdrop-blur-sm">
                                <span class="text-[10px] font-mono uppercase tracking-wider" x-text="t('localRuntimeConfigTitle')"></span>
                            </div>
                        </div>
                    </div>
                    <div class="meta-chip flex items-center h-6 px-3 rounded-full bg-space-800/80 border border-space-border/50 shadow-sm backdrop-blur-sm"
                        :class="localRuntimeStatusClass()">
                        <span class="text-[10px] font-mono uppercase tracking-wider" x-text="localRuntimeStatusLabel()"></span>
                    </div>
                </div>

                <div class="view-card overview-card overview-card-accent-green mb-6">
                    <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                        <div class="min-w-0">
                            <div class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('localModelsOverviewKicker')"></div>
                            <h2 class="overview-title text-xl font-semibold text-white mt-2" x-text="t('localModelsOverviewTitle')"></h2>
                            <p class="overview-copy text-sm text-gray-400 mt-3" x-text="t('localModelsOverviewDesc')"></p>
                        </div>
                        <div class="overview-meta flex flex-wrap gap-2">
                            <span class="meta-chip" x-text="localRuntime?.baseUrl || 'http://127.0.0.1:11434'"></span>
                            <span class="meta-chip" x-text="localRuntimeModels.length + ' ' + t('models')"></span>
                        </div>
                    </div>
                </div>

                <div class="view-card mb-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-emerald-400">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('localModelRoutingTitle')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('localModelRoutingLabel')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('localModelRoutingDesc')"></div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <span class="text-xs font-mono" :class="localModelRoutingEnabled ? 'text-neon-green' : 'text-red-400'" x-text="localModelRoutingEnabled ? t('enabled') : t('disabled')"></span>
                            <button class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none"
                                :class="localModelRoutingEnabled ? 'bg-neon-green' : 'bg-space-700'"
                                :disabled="localModelRoutingSaving"
                                @click="toggleLocalModelRouting()">
                                <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200"
                                    :class="localModelRoutingEnabled ? 'translate-x-6' : 'translate-x-1'"></span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="view-card">
                    <div class="flex items-center justify-between gap-4 mb-4">
                        <div class="flex items-center gap-2.5">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-emerald-400">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L6 20.75V6a2 2 0 012-2h8a2 2 0 012 2v5.25M15 15h6m-3-3v6"></path>
                            </svg>
                            <div>
                                <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('localRuntimeConfigTitle')"></h3>
                                <p class="text-xs text-gray-500 mt-1" x-text="t('localRuntimeConfigDesc')"></p>
                            </div>
                        </div>
                        <div class="inline-flex items-center rounded-full border border-space-border/40 bg-white/[0.04] px-3 py-1 text-[11px] font-mono"
                            :class="localRuntimeStatusClass()"
                            x-text="localRuntimeStatusLabel()"></div>
                    </div>

                    <template x-if="localRuntime">
                        <div>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs text-gray-500 mb-1 block" x-text="t('localRuntimeName')"></label>
                                    <input type="text"
                                        class="input input-sm w-full bg-space-900/80 border-space-border text-white"
                                        :value="localRuntime?.name || ''"
                                        @input="updateLocalRuntimeField('name', $event.target.value)">
                                </div>
                                <div>
                                    <label class="text-xs text-gray-500 mb-1 block" x-text="t('localRuntimeBaseUrl')"></label>
                                    <input type="text"
                                        class="input input-sm w-full bg-space-900/80 border-space-border text-white"
                                        :value="localRuntime?.baseUrl || ''"
                                        @input="updateLocalRuntimeField('baseUrl', $event.target.value)"
                                        placeholder="http://127.0.0.1:11434">
                                </div>
                            </div>

                            <div class="mt-4 flex flex-wrap items-center gap-4">
                                <label class="inline-flex items-center gap-2 text-xs text-gray-300">
                                    <input type="checkbox" class="checkbox checkbox-xs"
                                        :checked="localRuntime?.enabled !== false"
                                        @change="updateLocalRuntimeField('enabled', $event.target.checked)">
                                    <span x-text="t('localRuntimeEnabledFlag')"></span>
                                </label>
                                <span class="text-xs font-mono text-gray-500">
                                    <span x-text="t('lastUpdated')"></span>
                                    <span>: </span>
                                    <span x-text="localRuntimeUpdatedAtLabel()"></span>
                                </span>
                            </div>

                            <div class="mt-4 flex flex-wrap gap-2">
                        <button class="btn btn-sm btn-accent-cyan"
                                    :disabled="localRuntimeSaving"
                                    @click="saveLocalRuntimeConfig()"
                                    x-text="localRuntimeSaving ? t('saving') : t('saveRuntimeConfig')"></button>
                                <button class="btn btn-sm btn-surface"
                                    :disabled="localRuntimeChecking"
                                    @click="checkLocalRuntimeHealth()"
                                    x-text="localRuntimeChecking ? t('checking') : t('checkConnection')"></button>
                                <button class="btn btn-sm btn-surface"
                                    :disabled="localRuntimeModelsLoading"
                                    @click="refreshLocalRuntimeModels()"
                                    x-text="localRuntimeModelsLoading ? t('loadingModels') : t('refreshLocalModels')"></button>
                            </div>

                            <div class="mt-5 grid grid-cols-1 xl:grid-cols-3 gap-3">
                                <div class="rounded-xl border border-space-border/25 bg-space-900/35 p-3">
                                    <div class="text-[10px] uppercase tracking-[0.24em] text-gray-500" x-text="t('localRuntimeHealth')"></div>
                                    <div class="mt-2 text-sm font-semibold" :class="localRuntimeStatusClass()" x-text="localRuntimeStatusLabel()"></div>
                                    <div class="mt-1 text-xs text-gray-500 font-mono" x-show="localRuntimeHealth?.version">
                                        Ollama v<span x-text="localRuntimeHealth?.version"></span>
                                    </div>
                                    <div class="mt-1 text-xs text-red-400 font-mono" x-show="localRuntimeHealth?.error" x-text="localRuntimeHealth?.error"></div>
                                </div>
                                <div class="rounded-xl border border-space-border/25 bg-space-900/35 p-3">
                                    <div class="text-[10px] uppercase tracking-[0.24em] text-gray-500" x-text="t('localRuntimeDiscoveredModels')"></div>
                                    <div class="mt-2 text-sm font-semibold text-white" x-text="localRuntimeModels.length"></div>
                                    <div class="mt-1 text-xs text-gray-500 font-mono" x-text="t('localRuntimeDiscoveredModelsDesc')"></div>
                                </div>
                                <div class="rounded-xl border border-space-border/25 bg-space-900/35 p-3">
                                    <div class="text-[10px] uppercase tracking-[0.24em] text-gray-500" x-text="t('localRuntimeRegistered')"></div>
                                    <div class="mt-2 text-sm font-semibold text-white" x-text="localRuntimes.length"></div>
                                    <div class="mt-1 text-xs text-gray-500 font-mono" x-text="t('localRuntimeRegisteredDesc')"></div>
                                </div>
                            </div>

                            <div class="mt-5">
                                <div class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-3" x-text="t('localRuntimeDefaultModels')"></div>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <template x-for="appId in ['codex', 'claude-code', 'openclaw']" :key="'local-default-' + appId">
                                        <div class="rounded-xl border border-space-border/25 bg-space-900/35 p-3">
                                            <label class="text-xs text-gray-500 mb-2 block" x-text="t('appLabel_' + appId)"></label>
                                            <select class="select select-sm w-full bg-space-800 border-space-border text-white"
                                                :value="localRuntime?.defaultModels?.[appId] || ''"
                                                @change="updateLocalRuntimeDefaultModel(appId, $event.target.value)">
                                                <option value="" x-text="t('followRequestedModel')"></option>
                                                <template x-for="model in localRuntimeModels" :key="appId + '-' + model.id">
                                                    <option :value="model.id" x-text="model.id"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div class="mt-5">
                                <div class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-3" x-text="t('localRuntimeModelList')"></div>
                                <div class="rounded-xl border border-space-border/25 bg-space-900/35 p-3 max-h-56 overflow-y-auto">
                                    <template x-if="localRuntimeModels.length === 0">
                                        <div class="text-xs text-gray-500 text-center py-6" x-text="t('noLocalModelsYet')"></div>
                                    </template>
                                    <div class="flex flex-wrap gap-2" x-show="localRuntimeModels.length > 0">
                                        <template x-for="model in localRuntimeModels" :key="'local-model-' + model.id">
                                            <span class="inline-flex items-center rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-[11px] font-mono text-emerald-300"
                                                x-text="model.id"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="!localRuntime">
                        <div class="text-xs text-gray-500 text-center py-6" x-text="t('localRuntimeMissing')"></div>
                    </template>
                </div>
