<div class="chat-layout flex flex-1 min-h-0 gap-6 items-stretch overflow-hidden">
                    <div class="view-card chat-main-panel flex-1 flex flex-col h-full min-h-0 min-w-0 overflow-hidden">
                        <div class="chat-header flex items-start justify-between gap-4 mb-5 flex-shrink-0">
                            <div class="chat-header-copy">
                                <div class="chat-header-eyebrow text-[11px] font-mono uppercase tracking-[0.18em] text-gray-500">Workspace</div>
                                <h1 class="text-2xl font-bold text-white tracking-tight mt-2" x-text="t('chat')"></h1>
                                <p class="chat-header-subtitle text-sm text-gray-400 mt-1" x-text="t('chatDesc')"></p>
                            </div>
                            <div class="chat-header-actions flex items-center gap-2">
                                <button class="chat-header-button btn btn-sm btn-surface"
                                    @click="toggleChatHistory()">
                                    <span x-text="t('chatHistory')"></span>
                                </button>
                                <button class="chat-header-button btn btn-sm btn-surface"
                                    @click="openChatSidebar('runtime')">
                                    <span x-text="t('agentRuntimeMonitor')"></span>
                                </button>
                                <button class="chat-header-button chat-header-button-primary btn btn-sm btn-accent-cyan"
                                    @click="newChatSession()" x-text="t('newChat')"></button>
                            </div>
                        </div>

                        <div class="chat-control-panel rounded-2xl border border-space-border/30 bg-space-900/40 p-3 mb-4 flex-shrink-0">
                            <div class="chat-control-grid flex flex-wrap items-end gap-3">
                                <div class="chat-control-field min-w-0 chat-control-fixed" style="flex:0 0 148px;">
                                    <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('chatMode')"></label>
                                    <select x-model="chatMode" @change="syncActiveChatSession()"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs">
                                        <option value="assistant" x-text="t('chatModeAssistant')"></option>
                                        <option value="agent-runtime" x-text="t('chatModeAgent')"></option>
                                    </select>
                                </div>
                                <div class="chat-control-field min-w-0 chat-control-fixed" style="flex:0 0 168px;">
                                    <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('chatSource')"></label>
                                    <select x-model="chatSourceId" @change="ensureChatModelMatchesSource(); syncActiveChatSession()" x-show="chatMode === 'assistant'"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs">
                                        <template x-for="source in chatSources" :key="source.id">
                                            <option :value="source.id" x-text="source.label"></option>
                                        </template>
                                    </select>
                                    <select x-model="chatRuntimeProvider" @change="syncActiveChatSession()" x-show="chatMode === 'agent-runtime'"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs">
                                        <template x-for="provider in agentRuntimeProviders" :key="provider.id">
                                            <option :value="provider.id" x-text="chatRuntimeProviderLabel(provider.id)"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="chat-control-field min-w-0 chat-control-flex" style="flex:1 1 auto;">
                                    <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('chatModel')"></label>
                                    <input type="text" list="chat-model-options" x-model="chatModel" @change="syncActiveChatSession()"
                                        class="chat-control-input input mt-1.5 h-10 bg-space-800 border-space-border text-white font-mono text-xs"
                                        :placeholder="t('chatModelPlaceholder')">
                                    <datalist id="chat-model-options">
                                        <template x-for="model in chatModelOptions()" :key="model">
                                            <option :value="model"></option>
                                        </template>
                                    </datalist>
                                </div>
                                <label x-show="chatMode === 'assistant'" class="chat-control-toggle chat-control-toggle-pill flex items-center gap-2 px-3 h-10 rounded-xl border text-xs text-gray-200 mb-[1px] whitespace-nowrap">
                                    <input type="checkbox" x-model="chatAssistantMode" @change="syncActiveChatSession()"
                                        class="app-toggle chat-control-toggle-input">
                                    <span x-text="t('chatAssistantMode')"></span>
                                </label>
                                <button x-show="chatMode === 'assistant'" class="chat-control-button btn btn-sm btn-surface mb-[1px] whitespace-nowrap"
                                    style="flex:0 0 auto;"
                                    @click="toggleSystemPrompt()">
                                    <span x-text="chatSystemPromptOpen ? t('hidePrompt') : t('showPrompt')"></span>
                                </button>
                            </div>

                            <div class="chat-control-helper mt-2 text-[11px] text-gray-500" x-show="chatMode === 'assistant' && chatSourceLoading" x-text="t('loadingChatSources')"></div>

                            <div x-show="chatSystemPromptOpen && chatMode === 'assistant'" x-transition class="chat-system-prompt mt-3 pt-3 border-t border-space-border/20">
                                <label class="chat-control-label text-[11px] font-mono text-gray-400 uppercase tracking-wider" x-text="t('systemPromptOptional')"></label>
                                <textarea x-model="chatSystemPrompt" @input.debounce.300ms="syncActiveChatSession()" rows="3"
                                    class="chat-control-input input mt-1.5 bg-space-800 border-space-border text-white font-mono text-xs resize-y"
                                    :placeholder="t('systemPromptPlaceholder')"></textarea>
                            </div>
                        </div>

                        <div class="chat-status-bar flex items-center justify-between gap-4 mb-4 flex-shrink-0">
                            <div class="chat-status-copy text-sm text-gray-400 min-w-0">
                                <template x-if="chatMode === 'assistant'">
                                    <div class="chat-status-group">
                                        <span class="chat-status-label" x-text="t('chatUsing')"></span>
                                        <span class="chat-status-pill text-white font-mono ml-2 truncate inline-block max-w-[340px] align-bottom" x-text="chatSourceLabel(chatSourceId)"></span>
                                    </div>
                                </template>
                                <template x-if="chatMode === 'agent-runtime'">
                                    <div class="chat-status-group flex items-center gap-2 flex-wrap">
                                        <span class="chat-status-label" x-text="t('agentRuntimeUsing')"></span>
                                        <span class="chat-status-pill text-white font-mono" x-text="chatRuntimeProviderLabel(chatRuntimeProvider)"></span>
                                        <span class="chat-status-pill chat-status-pill-muted text-[10px] font-mono text-gray-300"
                                            x-text="agentRuntimeStatusLabel()"></span>
                                        <span class="chat-status-pill chat-status-pill-secondary text-[10px] font-mono text-gray-400"
                                            x-text="activeRuntimeSessionBadge()"></span>
                                        <button class="chat-status-button btn btn-xs btn-surface"
                                            x-show="getActiveChatSession()?.runtimeSessionId"
                                            @click="startFreshAgentRuntimeSession()" x-text="t('agentRuntimeNewSession')"></button>
                                        <button class="chat-status-button chat-status-button-muted btn btn-xs btn-surface"
                                            x-show="getActiveChatSession()?.runtimeSessionId"
                                            @click="detachAgentRuntimeSession()" x-text="t('agentRuntimeDetach')"></button>
                                    </div>
                                </template>
                            </div>
                            <div class="chat-status-count text-xs font-mono text-gray-500" x-text="chatMessages.length + ' ' + t('messagesLower')"></div>
                        </div>

                        <div x-ref="chatMessagesContainer" class="chat-message-stage flex-1 min-h-0 overflow-y-auto custom-scrollbar rounded-2xl border border-space-border/30 bg-space-950/40 p-4 space-y-4">
                            <template x-if="chatMessages.length === 0">
                                <div class="chat-empty-state h-full min-h-[320px] flex items-center justify-center text-center text-gray-500">
                                    <div class="chat-empty-card">
                                        <div class="chat-empty-title text-sm" x-text="t('chatEmptyTitle')"></div>
                                        <div class="chat-empty-desc text-xs mt-2 font-mono" x-text="t('chatEmptyDesc')"></div>
                                    </div>
                                </div>
                            </template>

                            <template x-for="(message, index) in chatMessages" :key="index">
                                <div class="flex chat-message-row" :class="(message.role === 'user' || message.kind === 'agent-input') ? 'justify-end' : 'justify-start'">
                                    <div class="chat-message-bubble max-w-[90%] rounded-2xl px-4 py-3 border"
                                        :class="[
                                            message.role === 'user'
                                                ? 'text-white'
                                                : (message.isError ? 'bg-red-500/10 border-red-500/30 text-red-200' : 'text-gray-100'),
                                            message.kind === 'agent-input' ? 'chat-message-bubble-dispatch' : ''
                                        ]">
                                        <div class="chat-message-meta flex items-center gap-2 mb-2">
                                            <span class="text-[10px] font-mono uppercase tracking-wider"
                                                :class="message.role === 'user' ? 'text-neon-cyan' : (message.isError ? 'text-red-300' : 'text-gray-400')"
                                                x-text="message.role === 'user' ? t('you') : t('assistant')"></span>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.mappedModel" x-text="message.mappedModel"></span>
                                            <span class="text-[10px] font-mono text-violet-300" x-show="message.kind === 'agent-input'" x-text="t('agentRuntimeDispatch')"></span>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.kind === 'agent-command'" x-text="t('agentRuntimeCommand')"></span>
                                            <span class="text-[10px] font-mono text-gray-500" x-show="message.kind === 'agent-file-change'" x-text="t('agentRuntimeFilesChanged')"></span>
                                        </div>
                                        <pre class="chat-message-body whitespace-pre-wrap break-words text-sm font-sans" x-text="message.content"></pre>
                                        <div class="chat-message-detail mt-3 rounded-xl border border-space-border/30 bg-space-950/50 p-3"
                                            x-show="message.observability && formatAssistantRunObservability(message.observability, message.runStatus)">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-gray-500 mb-2">assistant run</div>
                                            <pre class="whitespace-pre-wrap break-words text-[11px] font-mono text-gray-300"
                                                x-text="formatAssistantRunObservability(message.observability, message.runStatus)"></pre>
                                        </div>
                                        <div class="chat-message-detail chat-command-output mt-3 rounded-xl border border-space-border/30 bg-space-950/50 p-3" x-show="message.kind === 'agent-command' && message.commandOutput">
                                            <button type="button"
                                                class="chat-command-output-toggle w-full flex items-center justify-between gap-2 text-left"
                                                @click="message.commandOutputCollapsed = !message.commandOutputCollapsed">
                                                <span class="text-[10px] font-mono uppercase tracking-wider text-gray-500" x-text="t('agentRuntimeCommandOutput')"></span>
                                                <span class="chat-command-output-chevron text-[11px] font-mono text-gray-400"
                                                    :title="message.commandOutputCollapsed ? t('agentRuntimeCommandOutputExpand') : t('agentRuntimeCommandOutputCollapse')"
                                                    x-text="message.commandOutputCollapsed ? '▶' : '▼'"></span>
                                            </button>
                                            <pre class="chat-command-output-body whitespace-pre-wrap break-words text-xs font-mono text-gray-300 mt-2"
                                                x-show="!message.commandOutputCollapsed"
                                                x-text="message.commandOutput"></pre>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-question mt-3 rounded-xl border border-cyan-500/30 bg-cyan-500/10 p-3" x-show="message.kind === 'agent-question'">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-cyan-300 mb-2" x-text="t('agentRuntimeQuestion')"></div>
                                            <div class="text-xs text-cyan-100/80" x-show="message.questionStatus === 'pending'" x-text="t('agentRuntimeQuestionHint')"></div>
                                            <div class="text-xs text-gray-400" x-show="message.questionStatus !== 'pending'" x-text="t('agentRuntimeQuestionAnswered')"></div>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-approval mt-3 rounded-xl border border-amber-500/30 bg-amber-500/10 p-3" x-show="message.kind === 'agent-approval'">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-amber-300 mb-2" x-text="t('agentRuntimeApproval')"></div>
                                            <div class="text-xs text-amber-100/80 mt-2" x-text="message.approvalSummary || ''"></div>
                                            <div class="mt-3 flex items-center gap-2" x-show="message.approvalStatus === 'pending'">
                                                <button class="btn btn-sm btn-confirm"
                                                    @click="respondAgentRuntimeApproval(message, 'approve')" :disabled="message._approving === true">
                                                    <span x-text="message._approving ? t('sending') : t('confirmAction')"></span>
                                                </button>
                                                <button class="btn btn-sm btn-surface"
                                                    @click="respondAgentRuntimeApproval(message, 'deny')" :disabled="message._approving === true"
                                                    x-text="t('cancel')"></button>
                                            </div>
                                            <div class="mt-3 text-xs text-gray-300" x-show="message.approvalStatus !== 'pending'" x-text="message.approvalStatus"></div>
                                        </div>
                                        <div class="chat-message-citations mt-3" x-show="Array.isArray(message.citations) && message.citations.length > 0">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-gray-500 mb-2" x-text="t('chatManualSources')"></div>
                                            <div class="flex flex-wrap gap-2">
                                                <template x-for="citation in message.citations" :key="citation.id || citation.title">
                                                    <span class="chat-message-citation px-2 py-1 rounded-full bg-space-900/90 border border-space-border/40 text-[10px] font-mono text-gray-300"
                                                        x-text="formatChatCitation(citation)"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="chat-message-callout chat-message-callout-approval mt-3 rounded-xl border border-amber-500/30 bg-amber-500/10 p-3" x-show="message.pendingAction">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-amber-300 mb-2" x-text="t('assistantPendingAction')"></div>
                                            <div class="chat-message-callout-title text-sm text-white" x-text="message.pendingAction?.title || ''"></div>
                                            <div class="text-xs text-amber-100/80 mt-2" x-text="message.pendingAction?.summary || ''"></div>
                                            <div class="mt-3 flex items-center gap-2">
                                                <button class="btn btn-sm btn-confirm"
                                                    @click="confirmChatPendingAction(message)" :disabled="message._confirming === true">
                                                    <span x-text="message._confirming ? t('sending') : t('confirmAction')"></span>
                                                </button>
                                                <button class="btn btn-sm btn-surface"
                                                    @click="dismissChatPendingAction(message)" x-text="t('cancel')"></button>
                                            </div>
                                        </div>
                                        <div class="mt-3 text-[10px] font-mono text-gray-500" x-show="message.usage">
                                            <span x-text="'in ' + (message.usage?.prompt_tokens || 0)"></span>
                                            <span class="mx-2">&middot;</span>
                                            <span x-text="'out ' + (message.usage?.completion_tokens || 0)"></span>
                                            <span class="mx-2">&middot;</span>
                                            <span x-text="'total ' + (message.usage?.total_tokens || 0)"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="chat-composer mt-4 space-y-3 flex-shrink-0">
                            <textarea x-model="chatInput" rows="4"
                                class="chat-composer-input input bg-space-800 border-space-border text-white font-sans text-sm resize-y"
                                :placeholder="chatMode === 'agent-runtime' ? t('agentRuntimeInputPlaceholder') : t('chatInputPlaceholder')"
                                @keydown.ctrl.enter.prevent="sendChatMessage()"
                                @keydown.meta.enter.prevent="sendChatMessage()"></textarea>
                            <div class="chat-composer-footer flex items-center justify-between gap-4">
                                <div class="chat-composer-hint text-xs text-gray-500" x-text="chatMode === 'agent-runtime' ? t('agentRuntimeShortcutHint') : t('chatShortcutHint')"></div>
                                <button class="chat-composer-submit btn btn-accent-cyan"
                                    @click="sendChatMessage()" :disabled="chatSendDisabled()">
                                    <span x-text="chatLoading ? t('sending') : t('send')"></span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="chat-history-panel overflow-hidden shrink-0 h-full min-h-0 transition-all duration-300 ease-out"
                        :class="chatHistoryOpen ? 'w-[320px] opacity-100 translate-x-0' : 'w-0 opacity-0 translate-x-4 pointer-events-none'">
                        <div class="view-card chat-side-panel w-[320px] h-full min-h-0 flex flex-col overflow-hidden">
                            <div class="chat-side-header flex items-center justify-between gap-3 mb-3 flex-shrink-0">
                                <div class="chat-side-tabs flex items-center gap-1 p-1 rounded-lg bg-space-900/60 border border-space-border/30">
                                    <button class="chat-side-tab px-3 py-1.5 rounded-md text-[11px] font-mono transition-all"
                                        :class="chatSidebarTab === 'history' ? 'chat-side-tab-active text-white' : 'text-gray-500 hover:text-white'"
                                        @click="openChatSidebar('history')" x-text="t('historyPanel')"></button>
                                    <button class="chat-side-tab px-3 py-1.5 rounded-md text-[11px] font-mono transition-all"
                                        :class="chatSidebarTab === 'runtime' ? 'chat-side-tab-active text-white' : 'text-gray-500 hover:text-white'"
                                        @click="openChatSidebar('runtime')" x-text="t('agentRuntimeMonitor')"></button>
                                    <button class="chat-side-tab px-3 py-1.5 rounded-md text-[11px] font-mono transition-all"
                                        :class="chatSidebarTab === 'mind' ? 'chat-side-tab-active text-white' : 'text-gray-500 hover:text-white'"
                                        @click="openChatSidebar('mind')" x-text="t('assistantMindPanel')"></button>
                                </div>
                                <div class="chat-side-summary flex items-center gap-2">
                                    <div class="chat-side-count text-[11px] font-mono text-gray-500"
                                        x-text="chatSidebarTab === 'history' ? (chatSessions.length + ' ' + t('sessions'))
                                            : (chatSidebarTab === 'runtime' ? (agentRuntimeSessions.length + ' ' + t('sessions'))
                                            : (assistantMindSummary.knownCwdCount + ' cwd'))"></div>
                                    <button class="chat-side-close text-xs text-gray-500 hover:text-white" @click="chatHistoryOpen = false">&times;</button>
                                </div>
                            </div>
                            <div x-show="chatSidebarTab === 'history'" class="space-y-2 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                                <template x-for="session in chatSessions" :key="session.id">
                                    <div class="chat-session-card rounded-xl border px-3 py-2 transition-all cursor-pointer"
                                        :class="session.id === activeChatSessionId
                                            ? 'chat-session-card-active'
                                            : (session.runtimeUnread ? 'chat-session-card-unread' : '')"
                                        @click="openChatSession(session.id)">
                                        <div class="chat-session-head flex items-start justify-between gap-2">
                                            <div class="chat-session-copy min-w-0">
                                                <div class="chat-session-title-row flex items-center gap-2 min-w-0">
                                                    <div class="chat-session-title text-sm text-white truncate" x-text="chatSessionTitle(session)"></div>
                                                    <span x-show="session.runtimeUnread"
                                                        class="chat-session-badge px-1.5 py-0.5 rounded-full bg-amber-500/20 border border-amber-500/30 text-[10px] font-mono text-amber-300">new</span>
                                                </div>
                                                <div class="chat-session-subtitle text-[11px] font-mono text-gray-500 truncate mt-1" x-text="session.mode === 'agent-runtime' ? chatRuntimeProviderLabel(session.runtimeProvider || '') : chatSourceLabel(session.sourceId || '')"></div>
                                            </div>
                                            <button class="chat-session-remove text-xs text-gray-500 hover:text-red-300" @click.stop="removeChatSession(session.id)">&times;</button>
                                        </div>
                                        <div class="chat-session-meta mt-2 text-[11px] text-gray-500 flex items-center gap-2">
                                            <span x-text="chatModeLabel(session.mode || 'assistant')"></span>
                                            <span>&middot;</span>
                                            <span x-text="session.model || 'gpt-5.2'"></span>
                                            <span>&middot;</span>
                                            <span x-text="(session.messages || []).length + ' ' + t('messagesLower')"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <div x-show="chatSidebarTab === 'runtime'" class="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                                <div class="chat-runtime-toolbar flex items-center justify-between mb-3">
                                    <div class="text-[11px] font-mono text-gray-500" x-text="t('agentRuntimeMonitorDesc')"></div>
                                    <button class="chat-side-action btn btn-xs btn-surface"
                                        @click="loadAgentRuntimeSessions()" :disabled="agentRuntimeSessionsLoading">
                                        <span x-text="agentRuntimeSessionsLoading ? t('loading') : t('refresh')"></span>
                                    </button>
                                </div>
                                <div class="space-y-3">
                                    <template x-if="!agentRuntimeSessionsLoading && agentRuntimeSessions.length === 0">
                                        <div class="chat-runtime-card chat-runtime-empty rounded-xl border border-space-border/30 bg-space-900/30 px-3 py-4 text-sm text-gray-500"
                                            x-text="t('agentRuntimeMonitorEmpty')"></div>
                                    </template>
                                    <template x-for="(group, groupIndex) in agentRuntimeGroups()" :key="group.key">
                                        <div class="chat-runtime-cwd-group">
                                            <button type="button"
                                                class="chat-runtime-cwd-header w-full flex items-center justify-between gap-2 px-2 py-1.5 rounded-md text-left hover:bg-space-900/40"
                                                @click="toggleAgentRuntimeCwdGroup(group, groupIndex)">
                                                <div class="chat-runtime-cwd-label flex items-center gap-2 min-w-0">
                                                    <span class="text-[11px] font-mono text-gray-400" x-text="isAgentRuntimeCwdCollapsed(group, groupIndex) ? '▶' : '▼'"></span>
                                                    <span class="text-xs text-white truncate"
                                                        x-text="group.basename || t('agentRuntimeCwdMissing')"
                                                        :title="group.cwd || t('agentRuntimeCwdMissing')"></span>
                                                </div>
                                                <div class="flex items-center gap-2">
                                                    <span class="text-[10px] font-mono text-gray-500 truncate max-w-[140px]"
                                                        x-show="group.cwd && group.basename !== group.cwd"
                                                        x-text="group.cwd"></span>
                                                    <span class="chat-runtime-cwd-count px-1.5 py-0.5 rounded-full bg-space-800/80 border border-space-border/40 text-[10px] font-mono text-gray-300"
                                                        x-text="group.sessions.length"></span>
                                                </div>
                                            </button>
                                            <div class="space-y-2 mt-2"
                                                x-show="!isAgentRuntimeCwdCollapsed(group, groupIndex)">
                                                <template x-for="runtimeSession in group.sessions" :key="runtimeSession.id">
                                                    <div class="chat-runtime-card rounded-xl border border-space-border/30 bg-space-900/30 px-3 py-3">
                                                        <div class="chat-runtime-head flex items-start justify-between gap-2">
                                                            <div class="chat-runtime-copy min-w-0">
                                                                <div class="chat-runtime-title text-sm text-white truncate" x-text="runtimeSession.title || t('newChat')"></div>
                                                                <div class="chat-runtime-meta mt-1 text-[11px] font-mono text-gray-500 flex items-center gap-2 flex-wrap">
                                                                    <span x-text="chatRuntimeProviderLabel(runtimeSession.provider)"></span>
                                                                    <span>&middot;</span>
                                                                    <span x-text="runtimeSession.model || '-'"></span>
                                                                </div>
                                                            </div>
                                                            <span class="chat-runtime-status px-2 py-1 rounded-full border text-[10px] font-mono"
                                                                :class="agentRuntimeStatusPillClass(runtimeSession.status)"
                                                                x-text="agentRuntimeStatusLabel(runtimeSession)"></span>
                                                        </div>
                                                        <div class="chat-runtime-summary mt-2 text-[11px] text-gray-500" x-text="runtimeSession.summary || '-'"></div>
                                                        <div class="chat-runtime-footer mt-3 flex items-center justify-between gap-2">
                                                            <div class="chat-runtime-time text-[10px] font-mono text-gray-500" x-text="formatRelativeTime(runtimeSession.updatedAt)"></div>
                                                            <div class="flex items-center gap-2">
                                                                <button class="chat-side-action btn btn-xs btn-surface"
                                                                    @click="openAgentRuntimeMonitorSession(runtimeSession)" x-text="t('openInChat')"></button>
                                                                <button class="btn btn-xs btn-danger"
                                                                    x-show="['running','waiting_user','waiting_approval'].includes(runtimeSession.status)"
                                                                    @click="cancelAgentRuntimeTask(runtimeSession.id)" x-text="t('cancelTask')"></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div x-show="chatSidebarTab === 'mind'" class="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                                <div class="chat-runtime-toolbar flex items-center justify-between mb-3">
                                    <div class="text-[11px] font-mono text-gray-500" x-text="t('assistantMindPanelDesc')"></div>
                                    <button class="chat-side-action btn btn-xs btn-surface"
                                        @click="loadAssistantMind()" :disabled="assistantMindLoading">
                                        <span x-text="assistantMindLoading ? t('loading') : t('refresh')"></span>
                                    </button>
                                </div>
                                <div class="space-y-3">
                                    <!-- Pending Clarification -->
                                    <div class="chat-mind-card rounded-xl border border-violet-500/30 bg-violet-500/10 px-3 py-3"
                                        x-show="assistantMind.pendingClarification">
                                        <div class="flex items-start justify-between gap-2 mb-2">
                                            <div class="text-[10px] font-mono uppercase tracking-wider text-violet-300" x-text="t('assistantMindPendingClarification')"></div>
                                            <button class="text-violet-300 hover:text-violet-100 text-xs"
                                                :title="t('assistantMindCancelClarification')"
                                                @click="cancelAssistantClarification(assistantMind.pendingClarification?.id)">&times;</button>
                                        </div>
                                        <div class="text-sm text-white" x-text="assistantMind.pendingClarification?.question"></div>
                                        <div class="mt-2 space-y-1" x-show="(assistantMind.pendingClarification?.candidates || []).length > 0">
                                            <template x-for="cand in assistantMind.pendingClarification?.candidates || []" :key="cand.id">
                                                <div class="text-[11px] font-mono text-violet-100">
                                                    <span class="text-violet-300" x-text="cand.kind + ':'"></span>
                                                    <span x-text="cand.label"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Pending Runtime Question -->
                                    <div class="chat-mind-card rounded-xl border border-cyan-500/30 bg-cyan-500/10 px-3 py-3"
                                        x-show="(assistantMind.pendingQuestions || []).length > 0">
                                        <div class="text-[10px] font-mono uppercase tracking-wider text-cyan-300 mb-2" x-text="t('assistantMindPendingQuestion')"></div>
                                        <template x-for="q in assistantMind.pendingQuestions || []" :key="q.questionId">
                                            <div class="text-sm text-cyan-100/90 mb-1" x-text="q.text || q.questionId"></div>
                                        </template>
                                    </div>

                                    <!-- Pending Runtime Approval -->
                                    <div class="chat-mind-card rounded-xl border border-amber-500/30 bg-amber-500/10 px-3 py-3"
                                        x-show="(assistantMind.pendingApprovals || []).length > 0">
                                        <div class="text-[10px] font-mono uppercase tracking-wider text-amber-300 mb-2" x-text="t('assistantMindPendingApproval')"></div>
                                        <template x-for="a in assistantMind.pendingApprovals || []" :key="a.approvalId">
                                            <div class="text-sm text-amber-100/90 mb-1">
                                                <div x-text="a.title || a.approvalId"></div>
                                                <div class="text-[11px] text-amber-100/60 mt-0.5" x-show="a.summary" x-text="a.summary"></div>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- Known cwds -->
                                    <div class="chat-mind-card rounded-xl border border-space-border/30 bg-space-900/30 px-3 py-3">
                                        <div class="text-[10px] font-mono uppercase tracking-wider text-gray-400 mb-2" x-text="t('assistantMindKnownCwds')"></div>
                                        <template x-if="(assistantMind.knownCwds || []).length === 0">
                                            <div class="text-[11px] font-mono text-gray-500" x-text="t('assistantMindKnownCwdsEmpty')"></div>
                                        </template>
                                        <template x-for="cwd in (assistantMind.knownCwds || []).slice(0, 6)" :key="cwd.workspaceRef">
                                            <div class="chat-mind-cwd-row text-[11px] font-mono text-gray-300 mb-2 pb-2 border-b border-space-border/15 last:border-b-0">
                                                <div class="flex items-center justify-between gap-2">
                                                    <span class="text-white truncate" x-text="agentRuntimeCwdBasename(cwd.workspaceRef) || cwd.workspaceRef"></span>
                                                    <span class="text-[10px] text-gray-500" x-text="(cwd.openTaskIds?.length || 0) + '/' + (cwd.taskIds?.length || 0)"></span>
                                                </div>
                                                <div class="text-[10px] text-gray-500 truncate" x-text="cwd.workspaceRef"></div>
                                                <div class="text-[10px] text-gray-400 mt-0.5" x-show="(cwd.aliases || []).length > 0"
                                                    x-text="(cwd.aliases || []).slice(0, 3).join(' · ')"></div>
                                                <div class="mt-1 flex items-center gap-1"
                                                    x-show="assistantAliasEditingFor === cwd.workspaceRef">
                                                    <input class="input input-xs flex-1 bg-space-800 border-space-border text-[10px]"
                                                        :placeholder="t('assistantMindAliasPlaceholder')"
                                                        x-model="assistantAliasInput"
                                                        @keydown.enter.prevent="submitAssistantAlias(cwd.workspaceRef)" />
                                                    <button class="btn btn-xs btn-surface" @click="submitAssistantAlias(cwd.workspaceRef)" x-text="t('confirmAction')"></button>
                                                    <button class="btn btn-xs btn-surface" @click="assistantAliasEditingFor = ''; assistantAliasInput = ''" x-text="t('cancel')"></button>
                                                </div>
                                                <div class="mt-1" x-show="assistantAliasEditingFor !== cwd.workspaceRef">
                                                    <button class="text-[10px] text-gray-500 hover:text-violet-300"
                                                        @click="assistantAliasEditingFor = cwd.workspaceRef; assistantAliasInput = ''"
                                                        x-text="t('assistantMindAliasAdd')"></button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- Recent tasks -->
                                    <div class="chat-mind-card rounded-xl border border-space-border/30 bg-space-900/30 px-3 py-3">
                                        <div class="text-[10px] font-mono uppercase tracking-wider text-gray-400 mb-2" x-text="t('assistantMindRecentTasks')"></div>
                                        <template x-if="(assistantMind.recentTasks || []).length === 0">
                                            <div class="text-[11px] font-mono text-gray-500" x-text="t('assistantMindRecentTasksEmpty')"></div>
                                        </template>
                                        <template x-for="task in (assistantMind.recentTasks || []).slice(0, 6)" :key="task.id">
                                            <div class="text-[11px] mb-1">
                                                <div class="text-white truncate" x-text="task.title || task.id"></div>
                                                <div class="text-[10px] text-gray-500 flex items-center gap-2">
                                                    <span x-text="task.status"></span>
                                                    <span>&middot;</span>
                                                    <span x-text="formatRelativeTime(task.updatedAt)"></span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
