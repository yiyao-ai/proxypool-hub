<div class="workspace-header flex items-center justify-between gap-4 mb-6">
                    <div>
                        <div class="workspace-eyebrow text-xs font-mono uppercase tracking-[0.32em]" x-text="t('configuration')"></div>
                        <div class="flex flex-wrap items-center gap-4 mt-2">

                            <div class="meta-chip flex items-center h-6 px-3 rounded-full bg-space-800/80 border border-space-border/50 shadow-sm backdrop-blur-sm">
                                <span class="text-[10px] font-mono uppercase tracking-wider"
                                    x-text="activeTab === 'assistantAgent' ? t('assistantAgentRuntime') : (activeTab === 'routing' ? t('routingMode') : t('serverConfiguration'))"></span>
                            </div>
                        </div>
                    </div>
                    <div class="meta-chip flex items-center h-6 px-3 rounded-full bg-space-800/80 border border-space-border/50 shadow-sm backdrop-blur-sm"
                        :class="connectionStatus === 'connected' ? 'text-neon-green' : 'text-red-400'">
                        <span class="text-[10px] font-mono uppercase tracking-wider"
                            x-text="connectionStatus === 'connected' ? t('online') : t('offline')"></span>
                    </div>
                </div>

                <div x-show="activeTab === 'settings'" class="view-card overview-card overview-card-accent-cyan mb-6">
                    <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                        <div class="min-w-0">
                            <div class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('settingsOverviewKicker')"></div>
                            <h2 class="overview-title text-xl font-semibold text-white mt-2" x-text="t('settingsOverviewTitle')"></h2>
                            <p class="overview-copy text-sm text-gray-400 mt-3" x-text="t('settingsOverviewDesc')"></p>
                        </div>
                        <div class="overview-meta flex flex-wrap gap-2">
                            <span class="meta-chip" x-text="'http://localhost:8081'"></span>
                            <span class="meta-chip" x-text="configPath"></span>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'settings'" class="view-card">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-neon-cyan">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('serverInfo')"></h3>
                    </div>
                    <div class="space-y-3">

                            <span class="text-sm text-gray-400" x-text="t('serverUrl')"></span>
                            <span class="font-mono text-sm text-white">http://localhost:8081</span>
                        </div>
                        <div class="flex items-center justify-between py-2 border-b border-space-border/30">
                            <span class="text-sm text-gray-400" x-text="t('configPath')"></span>
                            <span class="font-mono text-sm text-white" x-text="configPath"></span>
                        </div>
                        <div class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-400" x-text="t('autoTokenRefresh')"></span>
                            <span class="text-xs font-mono text-neon-green" x-text="t('every55min')"></span>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'assistantAgent'" class="view-card mt-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-cyan-300">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3a.75.75 0 01.75.75v.443c.794.077 1.56.264 2.287.548l.313-.313a.75.75 0 011.06 0l1.415 1.414a.75.75 0 010 1.061l-.313.313c.284.726.47 1.492.548 2.286h.444a.75.75 0 01.75.75v2a.75.75 0 01-.75.75h-.444a7.479 7.479 0 01-.548 2.287l.313.313a.75.75 0 010 1.06l-1.414 1.415a.75.75 0 01-1.061 0l-.313-.313a7.479 7.479 0 01-2.287.548v.444a.75.75 0 01-.75.75h-2a.75.75 0 01-.75-.75v-.444a7.479 7.479 0 01-2.286-.548l-.313.313a.75.75 0 01-1.061 0L4.42 18.58a.75.75 0 010-1.06l.313-.313A7.479 7.479 0 014.186 14.92h-.443a.75.75 0 01-.75-.75v-2a.75.75 0 01.75-.75h.443c.077-.794.264-1.56.548-2.286l-.313-.313a.75.75 0 010-1.061L5.835 4.35a.75.75 0 011.061 0l.313.313A7.479 7.479 0 019.496 4.12V3.75A.75.75 0 0110.246 3h-.496z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9.75A2.25 2.25 0 109 12a2.25 2.25 0 003 2.25"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('assistantAgentTitle')"></h3>
                    </div>
                    <div class="space-y-5">
                        <div class="flex flex-wrap items-center justify-between gap-4">
                            <div>
                                <div class="text-sm text-gray-300" x-text="t('assistantAgentEnabled')"></div>
                                <div class="text-xs text-gray-500 font-mono" x-text="t('assistantAgentDesc')"></div>
                            </div>
                            <div class="inline-flex items-center gap-3">
                                <span class="text-xs font-mono"
                                    :class="assistantAgentConfig.enabled ? 'text-neon-green' : 'text-red-400'"
                                    x-text="assistantAgentConfig.enabled ? t('enabled') : t('disabled')"></span>
                                <button class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none"
                                    :class="assistantAgentConfig.enabled ? 'bg-neon-green' : 'bg-space-700'"
                                    :disabled="assistantAgentSaving"
                                    @click="toggleAssistantAgentEnabled()">
                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200"
                                        :class="assistantAgentConfig.enabled ? 'translate-x-6' : 'translate-x-1'"></span>
                                </button>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="rounded-lg border border-space-border/50 bg-space-800/30 px-4 py-3">
                                <div class="flex flex-wrap items-center justify-between gap-3">
                                    <div>
                                        <div class="text-xs font-mono text-gray-500 uppercase tracking-widest" x-text="t('assistantAgentRuntime')"></div>
                                        <div class="mt-1 text-sm text-white"
                                            x-text="assistantAgentStatus.resolvedSource ? `${assistantAgentStatus.resolvedSource.label} / ${assistantAgentStatus.resolvedSource.model}` : t('assistantAgentNoResolvedSource')"></div>
                                    </div>
                                    <button class="btn btn-xs btn-outline text-gray-400"
                                        @click="loadAssistantAgentStatus()"
                                        :disabled="assistantAgentSaving"
                                        x-text="t('refresh')"></button>
                                </div>
                                <div class="mt-2 text-xs font-mono"
                                    :class="assistantAgentStatus.resolvedSource ? 'text-neon-green' : 'text-yellow-400'"
                                    x-text="assistantAgentStatus.resolvedSource ? t('assistantAgentResolvedReady') : (assistantAgentStatus.fallbackReason || t('assistantAgentFallbackRunner'))"></div>
                            </div>

                            <!-- Primary credential -->
                            <div class="space-y-2">
                                <div class="text-xs font-mono text-gray-500 uppercase tracking-widest" x-text="t('assistantAgentPrimary')"></div>
                                <div class="grid grid-cols-1 md:grid-cols-[minmax(0,1.6fr)_minmax(13rem,1fr)_auto] gap-2">
                                    <select class="w-full rounded-lg bg-space-800/60 border border-space-border/50 text-white px-3 py-2 text-sm"
                                        :disabled="assistantAgentSaving"
                                        :value="descriptorToValue(assistantAgentConfig.boundModelSource)"
                                        @change="setAssistantPrimary($event.target.value)">
                                        <option value="" x-text="t('assistantAgentNoBinding')"></option>
                                        <template x-for="group in assistantAgentCredentialOptions" :key="group.group">
                                            <optgroup :label="group.group">
                                                <template x-for="entry in group.entries" :key="entry.value">
                                                    <option :value="entry.value"
                                                        x-text="entry.label + (entry.available ? '' : ' (' + (entry.detail || t('assistantAgentUnavailable')) + ')')"></option>
                                                </template>
                                            </optgroup>
                                        </template>
                                    </select>
                                    <select class="w-full rounded-lg bg-space-800/60 border border-space-border/50 text-white px-3 py-2 text-sm"
                                        :disabled="assistantAgentSaving || !assistantAgentConfig.boundModelSource"
                                        :value="assistantAgentConfig.boundModelSource?.model || ''"
                                        @change="setAssistantPrimaryModel($event.target.value)">
                                        <option value="">Default model</option>
                                        <template x-for="modelId in assistantProviderModelsForDescriptor(assistantAgentConfig.boundModelSource)" :key="modelId">
                                            <option :value="modelId" x-text="modelId"></option>
                                        </template>
                                    </select>
                                    <button class="btn btn-xs btn-outline text-gray-300 whitespace-nowrap"
                                        :disabled="!assistantAgentConfig.boundModelSource || assistantAgentSaving"
                                        @click="testAssistantBinding(assistantAgentConfig.boundModelSource)"
                                        x-text="t('assistantAgentTest')"></button>
                                </div>
                                <template x-if="assistantAgentTestResult">
                                    <div class="text-[11px] font-mono"
                                        :class="assistantAgentTestResult.ok ? 'text-neon-green' : (assistantAgentTestResult.pending ? 'text-gray-400' : 'text-red-400')"
                                        x-text="assistantAgentTestResult.pending ? t('assistantAgentTesting') : (assistantAgentTestResult.ok ? (t('assistantAgentTestOk') + ' · ' + (assistantAgentTestResult.label || '')) : (t('assistantAgentTestFailed') + ': ' + (assistantAgentTestResult.reason || '')))"></div>
                                </template>
                            </div>

                            <!-- Fallbacks -->
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <div class="text-xs font-mono text-gray-500 uppercase tracking-widest" x-text="t('assistantAgentFallbacks')"></div>
                                    <div class="text-[10px] font-mono text-gray-500"
                                        x-text="(assistantAgentConfig.fallbacks?.length || 0) + ' / 3'"></div>
                                </div>
                                <template x-for="(fallback, index) in (assistantAgentConfig.fallbacks || [])" :key="index">
                                    <div class="rounded-lg border border-space-border/35 bg-space-900/25 px-3 py-3">
                                        <div class="flex items-center justify-between gap-3 mb-2">
                                            <span class="text-[10px] font-mono text-gray-500 uppercase tracking-widest" x-text="'#' + (index + 1)"></span>
                                            <div class="inline-flex items-center gap-1 shrink-0">
                                                <button
                                                    class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-space-border/50 bg-space-800/70 text-gray-300 transition-colors hover:bg-space-700/80 disabled:opacity-40 disabled:cursor-not-allowed"
                                                    :disabled="index === 0 || assistantAgentSaving"
                                                    @click="moveAssistantFallback(index, -1)"
                                                    title="Move up">↑</button>
                                                <button
                                                    class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-space-border/50 bg-space-800/70 text-gray-300 transition-colors hover:bg-space-700/80 disabled:opacity-40 disabled:cursor-not-allowed"
                                                    :disabled="index === (assistantAgentConfig.fallbacks?.length - 1) || assistantAgentSaving"
                                                    @click="moveAssistantFallback(index, 1)"
                                                    title="Move down">↓</button>
                                                <button
                                                    class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-red-500/30 bg-red-500/5 text-red-300 transition-colors hover:bg-red-500/10 disabled:opacity-40 disabled:cursor-not-allowed"
                                                    :disabled="assistantAgentSaving"
                                                    @click="removeAssistantFallback(index)"
                                                    title="Remove fallback">✕</button>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-1 md:grid-cols-[minmax(0,1.6fr)_minmax(13rem,1fr)] gap-2 min-w-0">
                                            <select class="w-full rounded-lg bg-space-800/60 border border-space-border/50 text-white px-3 py-2 text-sm"
                                                :disabled="assistantAgentSaving"
                                                :value="descriptorToValue(fallback)"
                                                @change="setAssistantFallback(index, $event.target.value)">
                                                <template x-for="group in assistantAgentCredentialOptions" :key="group.group">
                                                    <optgroup :label="group.group">
                                                        <template x-for="entry in group.entries" :key="entry.value">
                                                            <option :value="entry.value" x-text="entry.label"></option>
                                                        </template>
                                                    </optgroup>
                                                </template>
                                            </select>
                                            <select class="w-full rounded-lg bg-space-800/60 border border-space-border/50 text-white px-3 py-2 text-sm"
                                                :disabled="assistantAgentSaving || !fallback"
                                                :value="fallback?.model || ''"
                                                @change="setAssistantFallbackModel(index, $event.target.value)">
                                                <option value="">Default model</option>
                                                <template x-for="modelId in assistantProviderModelsForDescriptor(fallback)" :key="modelId">
                                                    <option :value="modelId" x-text="modelId"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </div>
                                </template>
                                <div x-show="(assistantAgentConfig.fallbacks?.length || 0) < 3">
                                    <select class="w-full rounded-lg bg-space-800/40 border border-dashed border-space-border/50 text-gray-300 px-3 py-2 text-xs"
                                        :disabled="assistantAgentSaving"
                                        @change="if ($event.target.value) { addAssistantFallback($event.target.value); $event.target.value = ''; }">
                                        <option value="" x-text="'+ ' + t('assistantAgentAddFallback')"></option>
                                        <template x-for="group in assistantAgentCredentialOptions" :key="group.group">
                                            <optgroup :label="group.group">
                                                <template x-for="entry in group.entries" :key="entry.value">
                                                    <option :value="entry.value" x-text="entry.label"></option>
                                                </template>
                                            </optgroup>
                                        </template>
                                    </select>
                                </div>
                            </div>

                            <!-- Circuit breaker config -->
                            <div class="space-y-2">
                                <div class="text-xs font-mono text-gray-500 uppercase tracking-widest" x-text="t('assistantAgentBreakerConfig')"></div>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                                    <label class="flex items-center gap-2">
                                        <span class="text-gray-400" x-text="t('assistantAgentBreakerThreshold')"></span>
                                        <input type="number" min="1" max="10" step="1"
                                            class="w-20 rounded-md bg-space-800/60 border border-space-border/50 text-white px-2 py-1 text-xs"
                                            :disabled="assistantAgentSaving"
                                            x-model.number="assistantAgentConfig.circuitBreaker.failureThreshold"
                                            @change="saveAssistantCircuitBreaker()">
                                    </label>
                                    <label class="flex items-center gap-2">
                                        <span class="text-gray-400" x-text="t('assistantAgentBreakerInterval')"></span>
                                        <select class="rounded-md bg-space-800/60 border border-space-border/50 text-white px-2 py-1 text-xs"
                                            :disabled="assistantAgentSaving"
                                            x-model.number="assistantAgentConfig.circuitBreaker.probeIntervalMs"
                                            @change="saveAssistantCircuitBreaker()">
                                            <option :value="60000">1 min</option>
                                            <option :value="120000">2 min</option>
                                            <option :value="300000">5 min</option>
                                            <option :value="600000">10 min</option>
                                            <option :value="1800000">30 min</option>
                                            <option :value="3600000">60 min</option>
                                        </select>
                                    </label>
                                </div>
                            </div>

                            <!-- Tier health table -->
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <div class="text-xs font-mono text-gray-500 uppercase tracking-widest" x-text="t('assistantAgentTierHealth')"></div>
                                    <button class="btn btn-xs btn-outline text-gray-400"
                                        :disabled="assistantAgentSaving"
                                        @click="resetAssistantBreaker()"
                                        x-text="t('assistantAgentResetBreaker')"></button>
                                </div>
                                <template x-if="!assistantAgentStatus.tiers || assistantAgentStatus.tiers.length === 0">
                                    <div class="text-xs font-mono text-gray-500" x-text="t('assistantAgentNoTiers')"></div>
                                </template>
                                <template x-for="(tier, index) in (assistantAgentStatus.tiers || [])" :key="tier.tier">
                                    <div class="rounded-md border border-space-border/50 bg-space-800/30 px-3 py-2 text-xs">
                                        <div class="flex items-center justify-between gap-2">
                                            <div class="font-mono text-gray-400" x-text="tier.tier.toUpperCase()"></div>
                                            <div class="font-mono"
                                                :class="tier.breaker.state === 'tripped' ? 'text-red-400' : (tier.resolved ? 'text-neon-green' : 'text-yellow-400')"
                                                x-text="tier.breaker.state === 'tripped' ? t('assistantAgentBreakerTripped') : (tier.resolved ? t('assistantAgentTierHealthy') : t('assistantAgentTierUnresolved'))"></div>
                                        </div>
                                        <div class="mt-1 text-gray-300" x-text="tier.label || (tier.descriptor.type + ' · ' + tier.descriptor.id)"></div>
                                        <template x-if="!tier.resolved && tier.reason">
                                            <div class="text-[10px] text-yellow-400" x-text="tier.reason"></div>
                                        </template>
                                        <template x-if="tier.breaker.consecutiveFailures">
                                            <div class="text-[10px] text-gray-500"
                                                x-text="t('assistantAgentRecentFailures') + ': ' + tier.breaker.consecutiveFailures"></div>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="assistantAgentStatus.lastUsed">
                                    <div class="text-[11px] font-mono text-gray-400 mt-2"
                                        x-text="t('assistantAgentLastUsed') + ': ' + (assistantAgentStatus.lastUsed.label || '') + ' · ' + new Date(assistantAgentStatus.lastUsed.at).toLocaleTimeString()"></div>
                                </template>
                            </div>

                            <div class="text-xs text-gray-500 font-mono" x-text="t('assistantAgentSourceHint')"></div>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-orange-400">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('routingMode')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('routingModeLabel')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('routingModeDesc')"></div>
                        </div>
                        <div class="inline-flex items-center gap-2">
                            <button class="btn btn-xs" :class="routingMode === 'automatic' ? 'bg-orange-400 text-black' : 'btn-outline text-gray-400'"
                                @click="setRoutingMode('automatic')" :disabled="routingModeSaving" x-text="t('automaticRouting')"></button>
                            <button class="btn btn-xs" :class="routingMode === 'app-assigned' ? 'bg-orange-400 text-black' : 'btn-outline text-gray-400'"

                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-neon-cyan">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('routingPriority')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('routingPriorityLabel')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('routingPriorityDesc')"></div>
                        </div>
                        <div class="inline-flex items-center gap-2">
                            <button class="btn btn-xs" :class="routingPriority === 'account-first' ? 'bg-neon-cyan text-black' : 'btn-outline text-gray-400'"
                                @click="setRoutingPriority('account-first')" :disabled="routingSaving" x-text="t('accountFirst')"></button>
                            <button class="btn btn-xs" :class="routingPriority === 'apikey-first' ? 'bg-neon-cyan text-black' : 'btn-outline text-gray-400'"
                                @click="setRoutingPriority('apikey-first')" :disabled="routingSaving" x-text="t('apikeyFirst')"></button>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-neon-purple">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('accountStrategy')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('strategy')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('strategyDesc')"></div>
                        </div>
                        <div class="inline-flex items-center gap-2">
                            <button class="btn btn-xs" :class="accountStrategy === 'random' ? 'bg-neon-purple text-white' : 'btn-outline text-gray-400'"

                            <button class="btn btn-xs" :class="accountStrategy === 'sequential' ? 'bg-neon-purple text-white' : 'btn-outline text-gray-400'"

                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6">

                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('freeModelsSwitch')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('freeModelsLabel')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('freeModelsDesc')"></div>
                        </div>
                        <div class="inline-flex items-center gap-3">
                            <span class="text-xs font-mono" :class="enableFreeModels ? 'text-neon-green' : 'text-red-400'" x-text="enableFreeModels ? t('enabled') : t('disabled')"></span>
                            <button class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none"
                                :class="enableFreeModels ? 'bg-neon-green' : 'bg-space-700'"

                            </button>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6" :class="{ 'opacity-50 pointer-events-none': !enableFreeModels }">
                    <div class="flex items-center gap-2.5 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-neon-purple">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('haikuKiloRouting')"></h3>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <div>
                            <div class="text-sm text-gray-300" x-text="t('haikuModelTarget')"></div>
                            <div class="text-xs text-gray-500 font-mono" x-text="t('routesHaikuDesc')"></div>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <template x-if="kiloModelsLoading">
                                <span class="text-xs text-gray-500 font-mono" x-text="t('loadingModels')"></span>
                            </template>
                            <template x-for="model in kiloModels" :key="model.id">
                                <button class="btn btn-xs transition-all"
                                    :class="haikuKiloModel === model.id ? 'bg-neon-purple text-white shadow-md shadow-neon-purple/20' : 'btn-outline text-gray-400 hover:text-white'"
                                    @click="setHaikuModel(model.id)"
                                    :disabled="haikuModelSaving"
                                    :title="model.id"
                                    x-text="model.name.replace(/ \(free\)/i, '').replace('Kilo Auto Free', 'Auto (Free)')">
                                </button>
                            </template>
                        </div>
                    </div>
                </div>

                <div x-show="activeTab === 'routing'" class="view-card mt-6" :class="{ 'opacity-60': routingMode !== 'app-assigned' }">
                    <div class="flex items-center gap-2.5 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-green-400">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h2m0-14h6m-6 14h6m-6-14v14m6-14h2a2 2 0 012 2v10a2 2 0 01-2 2h-2"></path>
                        </svg>
                        <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('appRoutingTitle')"></h3>
                    </div>
                    <p class="text-xs text-gray-500 mb-5" x-text="t('appRoutingDesc')"></p>

                    <!-- App selector + options -->
                    <div class="flex flex-wrap items-end gap-4 mb-4">
                        <div class="flex-1 min-w-[180px]">
                            <label class="text-xs text-gray-500 mb-1 block" x-text="t('appRoutingSelectApp')"></label>
                            <select class="select select-sm w-full bg-space-800 border-space-border text-white"
                                :value="selectedAppRoutingId"
                                @change="loadAppRoutingForm($event.target.value)">
                                <template x-for="appId in (appRoutingTargets.appIds || [])" :key="appId">
                                    <option :value="appId" x-text="t('appLabel_' + appId)"></option>
                                </template>
                            </select>
                        </div>
                        <label class="inline-flex items-center gap-2 text-xs text-gray-300 pb-1">
                            <input type="checkbox" class="checkbox checkbox-xs"
                                :checked="appRoutingForm.enabled === true"
                                @change="updateAppRoutingToggle('enabled', $event.target.checked)">
                            <span x-text="t('bindingEnabled')"></span>
                        </label>
                        <label class="inline-flex items-center gap-2 text-xs text-gray-300 pb-1">
                            <input type="checkbox" class="checkbox checkbox-xs"
                                :checked="appRoutingForm.fallbackToDefault !== false"
                                @change="updateAppRoutingToggle('fallbackToDefault', $event.target.checked)">
                            <span x-text="t('fallbackToDefault')"></span>
                        </label>
                    </div>

                    <!-- Binding editor + save -->
                    <div class="border border-space-border/30 rounded-lg p-3 bg-space-800/30 mb-4">
                        <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-3 items-end">
                            <div>
                                <label class="text-xs text-gray-500 mb-1 block" x-text="t('bindingType')"></label>
                                <select class="select select-sm w-full bg-space-800 border-space-border text-white"
                                    :value="appRoutingForm.currentType || ''"
                                    @change="updateAppRoutingFormField('currentType', $event.target.value || null)">
                                    <option value="" x-text="t('selectBindingType')"></option>
                                    <template x-for="bindingType in (appRoutingTargets.bindingTypes || [])" :key="bindingType">
                                        <option :value="bindingType" x-text="t('bindingTypeLabel_' + bindingType) || bindingType"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 mb-1 block" x-text="t('bindingTarget')"></label>
                                <button type="button"
                                    class="w-full rounded-xl border px-3 py-3 text-left transition-all"
                                    :class="!appRoutingForm.currentType
                                        ? 'border-space-border/30 bg-space-900/40 text-gray-500 cursor-not-allowed'
                                        : 'border-space-border/40 bg-white/[0.03] hover:border-neon-cyan/30'"
                                    :disabled="!appRoutingForm.currentType"
                                    @click="toggleAppRoutingTargetPicker()">
                                    <div class="flex items-center justify-between gap-3">
                                        <div class="min-w-0 flex-1">
                                            <div class="text-[10px] uppercase tracking-[0.24em] text-gray-500" x-text="t('bindingTargetPickerLabel')"></div>
                                            <div class="mt-1 text-sm text-gray-200 truncate">
                                                <template x-if="(appRoutingForm.currentTargetIds || []).length === 0">
                                                    <span x-text="t('bindingTargetPickerEmpty')"></span>
                                                </template>
                                                <template x-if="(appRoutingForm.currentTargetIds || []).length > 0">
                                                    <span>
                                                        <span x-text="getAppRoutingSelectionPreview().join(', ')"></span>
                                                        <template x-if="(appRoutingForm.currentTargetIds || []).length > 3">
                                                            <span class="text-gray-500" x-text="' +' + ((appRoutingForm.currentTargetIds || []).length - 3)"></span>
                                                        </template>
                                                    </span>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-2 shrink-0">
                                            <span class="inline-flex items-center rounded-full border border-space-border/40 bg-white/[0.04] px-2.5 py-1 text-[11px] font-mono text-gray-300"
                                                x-text="((appRoutingForm.currentTargetIds || []).length) + ' ' + t('bindingTargetsSelected')"></span>
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"
                                                class="w-4 h-4 text-gray-400 transition-transform"
                                                :class="{ 'rotate-180': appRoutingForm.targetPickerOpen }">
                                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25 12 15.75 4.5 8.25" />
                                            </svg>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>

                        <div x-show="appRoutingForm.targetPickerOpen" x-transition class="mt-3 rounded-2xl border border-space-border/35 bg-space-900/45 overflow-hidden">
                            <div class="border-b border-space-border/20 p-3">
                                <div class="flex flex-wrap items-center gap-2">
                                    <input type="text"
                                        class="input input-sm w-full xl:flex-1 xl:min-w-[280px] bg-space-900/80 border-space-border text-white"
                                        :placeholder="t('searchBindingTargets')"
                                        :value="appRoutingForm.targetQuery || ''"
                                        @input="updateAppRoutingFormField('targetQuery', $event.target.value || '')">
                                    <button type="button"
                                        class="btn btn-xs"
                                        :class="areAllFilteredTargetsSelected() ? 'bg-neon-cyan text-space-950 border-neon-cyan' : 'btn-outline text-gray-300'"
                                        :disabled="getFilteredBindingOptions(appRoutingForm.currentType, appRoutingForm.targetQuery).length === 0"
                                        @click="selectAllFilteredAppRoutingTargets()"
                                        x-text="t('selectAllBindingTargets')"></button>
                                    <button type="button"
                                        class="btn btn-xs btn-ghost text-gray-400"
                                        :disabled="!(appRoutingForm.currentTargetIds || []).length"
                                        @click="clearAllAppRoutingTargets()"
                                        x-text="t('clearBindingTargets')"></button>
                                    <button type="button"
                                        class="btn btn-xs btn-outline text-gray-300"
                                        @click="toggleAppRoutingTargetPicker(false)"
                                        x-text="t('collapseBindingPicker')"></button>
                                </div>
                                <div class="mt-2 flex flex-wrap items-center justify-between gap-2 text-[11px] text-gray-400">
                                    <span x-text="t('bindingTargetPickerHint')"></span>
                                    <span x-text="t('bindingTargetPickerStats', getFilteredBindingOptions(appRoutingForm.currentType, appRoutingForm.targetQuery).length, getBindingOptions(appRoutingForm.currentType).length)"></span>
                                </div>
                            </div>

                            <div class="max-h-60 overflow-y-auto p-2">
                                <template x-if="getFilteredBindingOptions(appRoutingForm.currentType, appRoutingForm.targetQuery).length === 0">
                                    <div class="text-xs text-gray-500 text-center py-8" x-text="t('noBindingTargetsMatch')"></div>
                                </template>
                                <div class="grid grid-cols-1 xl:grid-cols-2 gap-1.5">
                                    <template x-for="option in getFilteredBindingOptions(appRoutingForm.currentType, appRoutingForm.targetQuery)" :key="option.id || option.email">
                                        <button type="button"
                                            class="group w-full rounded-xl border px-3 py-2.5 text-left transition-all"
                                            :class="isAppRoutingTargetSelected(option.id || option.email)
                                                ? 'border-neon-cyan/50 bg-neon-cyan/10'
                                                : 'border-space-border/20 bg-white/[0.02] hover:border-space-border/50 hover:bg-white/[0.04]'"
                                            @click="toggleAppRoutingTarget(option.id || option.email)">
                                            <div class="flex items-start gap-3">
                                                <span class="mt-0.5 inline-flex h-5 w-5 items-center justify-center rounded-full border text-[10px] font-bold transition-colors"
                                                    :class="isAppRoutingTargetSelected(option.id || option.email)
                                                        ? 'border-neon-cyan bg-neon-cyan text-space-950'
                                                        : 'border-space-border/60 text-transparent group-hover:border-space-border'">✓</span>
                                                <span class="min-w-0 flex-1">
                                                    <span class="block truncate text-xs text-white" x-text="bindingOptionLabel(appRoutingForm.currentType, option)"></span>
                                                    <span class="block truncate text-[10px] text-gray-500" x-text="option.id || option.email"></span>
                                                </span>
                                            </div>
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3 rounded-2xl border border-dashed border-space-border/35 bg-white/[0.02] p-3">
                            <div class="flex flex-wrap items-start justify-between gap-3">
                                <div class="min-w-0 flex-1">
                                    <div class="text-[10px] uppercase tracking-[0.24em] text-gray-500" x-text="t('pendingBindingTargets')"></div>
                                    <div class="mt-2 flex flex-wrap gap-2" x-show="(appRoutingForm.currentTargetIds || []).length > 0">
                                        <template x-for="item in getSelectedAppRoutingTargets()" :key="item.id">
                                            <span class="inline-flex max-w-full items-center gap-2 rounded-full border border-neon-cyan/25 bg-neon-cyan/8 px-3 py-1 text-[11px] text-neon-cyan">
                                                <span class="truncate" x-text="item.label"></span>
                                                <button type="button" class="text-neon-cyan/80 hover:text-neon-cyan" @click="removeSelectedAppRoutingTarget(item.id)">×</button>
                                            </span>
                                        </template>
                                    </div>
                                    <div class="mt-2 text-xs text-gray-500" x-show="(appRoutingForm.currentTargetIds || []).length === 0" x-text="t('pendingBindingTargetsEmpty')"></div>
                                </div>
                                <button class="btn btn-sm bg-neon-cyan/90 hover:bg-neon-cyan text-space-950 border-none whitespace-nowrap"
                                    @click="saveAppRouting()"
                                    :disabled="appRoutingSaving[selectedAppRoutingId] || !appRoutingForm.currentType || !(appRoutingForm.currentTargetIds || []).length">
                                    <span x-text="appRoutingSaving[selectedAppRoutingId] ? t('sending') : t('addBindingTargets')"></span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Saved bindings list for current app -->
                    <div x-show="(appRoutingForm.bindings || []).length > 0">
                        <div class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-2" x-text="t('bindingListTitle')"></div>
                        <div class="space-y-1.5">
                            <template x-for="(binding, index) in (appRoutingForm.bindings || [])" :key="binding.id || index">
                                <div class="flex items-center gap-2 border border-space-border/25 rounded-xl px-3 py-2.5 bg-[linear-gradient(135deg,rgba(15,23,42,.56),rgba(17,24,39,.34))] shadow-[0_8px_24px_rgba(0,0,0,.12)]">
                                    <span class="text-[11px] font-mono text-gray-500 w-5 text-center shrink-0"
                                        x-text="'#' + (index + 1)"></span>
                                    <span class="inline-flex shrink-0 items-center rounded-full border border-space-border/40 bg-white/[0.04] px-2 py-1 text-[10px] uppercase tracking-[0.18em] text-gray-400"
                                        x-text="t('bindingTypeLabel_' + binding.type) || binding.type"></span>
                                    <span class="text-gray-600 text-xs">&rarr;</span>
                                    <span class="text-xs text-gray-200 flex-1 truncate"
                                        x-text="getBindingLabels(binding).join(', ')"></span>
                                    <div class="flex items-center gap-0.5 shrink-0">
                                        <template x-if="(appRoutingForm.bindings || []).length > 1">
                                            <div class="flex gap-0.5">
                                                <button class="btn btn-xs btn-ghost text-gray-400 px-1" @click="moveAppRoutingBinding(index, -1)"
                                                    :disabled="index === 0" :title="t('moveUp')">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
                                                </button>
                                                <button class="btn btn-xs btn-ghost text-gray-400 px-1" @click="moveAppRoutingBinding(index, 1)"
                                                    :disabled="index === (appRoutingForm.bindings || []).length - 1" :title="t('moveDown')">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
                                                </button>
                                            </div>
                                        </template>
                                        <button class="btn btn-xs btn-ghost text-red-400 px-1" @click="removeAppRoutingBinding(index)" :title="t('removeBinding')">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div x-show="(appRoutingForm.bindings || []).length === 0"
                        class="text-xs text-gray-500 text-center py-3" x-text="t('noBindingsYet')">
                    </div>

                    <!-- Configured Apps Summary -->
                    <div class="mt-5 border-t border-space-border/20 pt-4"
                        x-show="(appRoutingTargets.appIds || []).some((id) => appRouting[id]?.enabled && (appRouting[id]?.bindings || []).length > 0)">
                        <div class="text-xs font-mono text-gray-400 uppercase tracking-widest mb-3" x-text="t('configuredApps')"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                            <template x-for="appId in (appRoutingTargets.appIds || []).filter((id) => appRouting[id]?.enabled && (appRouting[id]?.bindings || []).length > 0)" :key="'configured-' + appId">
                                <div class="border border-space-border/30 rounded-lg p-3 bg-space-800/30 cursor-pointer hover:border-neon-cyan/30 transition-colors"
                                    @click="loadAppRoutingForm(appId)"
                                    :class="{ 'border-neon-cyan/50': selectedAppRoutingId === appId }">
                                    <div class="flex items-center justify-between gap-2 mb-2">
                                        <div class="text-sm font-semibold text-white" x-text="t('appLabel_' + appId)"></div>
                                        <span class="badge badge-xs bg-green-500/20 text-green-400 border-green-500/30"
                                            x-text="(appRouting[appId]?.bindings || []).length + ' ' + t('bindingCount')"></span>
                                    </div>
                                    <div class="space-y-1">
                                        <template x-for="(binding, index) in (appRouting[appId]?.bindings || [])" :key="binding.id || (appId + '-' + index)">
                                            <div class="flex items-center gap-2 text-[11px]">
                                                <span class="font-mono text-gray-500" x-text="'#' + (index + 1)"></span>
                                                <span class="text-gray-400" x-text="t('bindingTypeLabel_' + binding.type) || binding.type"></span>
                                                <span class="text-gray-600">&rarr;</span>
                                                <span class="text-gray-300 truncate" x-text="getBindingLabels(binding).join(', ')"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Model Mapping -->
                <div x-show="activeTab === 'routing'" class="view-card mt-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2.5">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4 text-neon-green">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                            </svg>
                            <h3 class="text-xs font-mono text-gray-400 uppercase tracking-widest" x-text="t('modelMapping')"></h3>
                        </div>
                        <button class="btn btn-xs btn-outline text-gray-400 hover:text-white gap-1"
                            @click="resetModelMappings()" :disabled="modelMappingSaving">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-3 h-3">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            <span x-text="t('resetDefaults')"></span>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mb-4" x-text="t('modelMappingDesc')"></p>

                    <template x-if="modelMappingData && modelMappingProviders.length === 0">
                        <div class="text-center py-6">
                            <p class="text-gray-500 text-sm" x-text="t('noProvidersConfigured')"></p>
                            <button class="btn btn-xs btn-outline text-neon-purple mt-2" @click="setActiveTab('apikeys')" x-text="t('addApiKey')"></button>
                        </div>
                    </template>
                    <template x-if="modelMappingData && modelMappingProviders.length > 0">
                        <div>
                            <!-- Tier × Provider table -->
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="border-b border-space-border/30">
                                            <th class="text-left py-2 px-2 text-xs font-mono text-gray-500 uppercase" x-text="t('tier')"></th>
                                            <template x-for="provider in modelMappingProviders" :key="provider">
                                                <th class="text-left py-2 px-2 text-xs font-mono uppercase"
                                                    :class="{
                                                        'text-neon-green': provider === 'gemini',
                                                        'text-neon-cyan': provider === 'openai' || provider === 'azure-openai',
                                                        'text-orange-400': provider === 'anthropic',
                                                        'text-purple-400': provider === 'vertex-ai'
                                                    }"
                                                    x-text="provider"></th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="tier in modelMappingData.tierOrder" :key="tier">
                                            <tr class="border-b border-space-border/20 hover:bg-space-800/30">
                                                <td class="py-2 px-2">
                                                    <div class="flex items-center gap-2">
                                                        <span class="inline-flex items-center h-5 px-2 rounded text-[10px] font-mono font-bold"
                                                            :class="{
                                                                'bg-red-500/20 text-red-400': tier === 'flagship',
                                                                'bg-blue-500/20 text-blue-400': tier === 'standard',
                                                                'bg-green-500/20 text-green-400': tier === 'fast',
                                                                'bg-yellow-500/20 text-yellow-400': tier === 'reasoning'
                                                            }"
                                                            x-text="tier"></span>
                                                    </div>
                                                    <div class="text-[10px] text-gray-600 mt-0.5" x-text="modelMappingData.tiers[tier]?.description"></div>
                                                </td>
                                                <template x-for="provider in modelMappingProviders" :key="provider + '-' + tier">
                                                    <td class="py-2 px-2">
                                                        <select class="select select-xs bg-space-800 border-space-border/30 text-white w-full max-w-[180px] font-mono text-xs"
                                                            :value="modelMappingData.providers[provider]?.[tier] || ''"
                                                            @change="updateModelMapping(provider, tier, $event.target.value)">
                                                            <template x-for="m in (modelMappingData.providerModels[provider] || [])" :key="m">
                                                                <option :value="m" x-text="m" :selected="m === modelMappingData.providers[provider]?.[tier]"></option>
                                                            </template>
                                                        </select>
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Test mapping -->
                            <div class="mt-4 p-3 bg-space-800/50 rounded-lg border border-space-border/20">
                                <div class="text-xs font-mono text-gray-500 mb-2" x-text="t('testMapping')"></div>
                                <div class="flex flex-wrap items-center gap-2">
                                    <input type="text" class="input input-xs bg-space-900 border-space-border/30 text-white font-mono w-40"
                                        :placeholder="t('testMappingPlaceholder')"
                                        x-model="testMappingInput"
                                        @input.debounce.300ms="testModelMapping()">
                                    <template x-if="testMappingResult">
                                        <div class="flex items-center gap-2 text-xs font-mono">
                                            <span class="inline-flex items-center h-5 px-2 rounded bg-space-700 text-gray-300" x-text="testMappingResult.tier"></span>
                                            <span class="text-gray-500">&rarr;</span>
                                            <template x-for="provider in modelMappingProviders" :key="'test-' + provider">
                                                <span class="inline-flex items-center h-5 px-2 rounded bg-space-700"
                                                    :class="{
                                                        'text-neon-green': provider === 'gemini',
                                                        'text-neon-cyan': provider === 'openai' || provider === 'azure-openai',
                                                        'text-orange-400': provider === 'anthropic',
                                                        'text-purple-400': provider === 'vertex-ai'
                                                    }">
                                                    <span x-text="provider + ': '"></span>
                                                    <span x-text="testMappingResults[provider] || '—'"></span>
                                                </span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template x-if="!modelMappingData">
                        <div class="text-center text-gray-500 text-sm py-4" x-text="t('loading')"></div>
                    </template>
                </div>
