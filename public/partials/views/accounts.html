                                        <input type="checkbox"

                                                    </div>

                                                        <span class="text-[10px] font-bold uppercase text-red-400 bg-red-500/10 px-1.5 py-0.5 rounded border border-red-500/30" x-text="t('used')"></span>

                                                        <span class="text-xs font-mono" :class="quotaTextClass(acc)" x-text="quotaLabel(acc)"></span>

                                                <template x-if="quotaResetSummary(acc)">

                                                </template>
